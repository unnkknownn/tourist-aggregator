<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Туристический агрегатор</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .tour-card { cursor: pointer; transition: transform 0.2s; }
        .tour-card:hover { transform: scale(1.02); }
        #status-area { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .toast { min-width: 250px; }
    </style>
</head>
<body class="bg-light">

<div class="container py-4">
    <h1 class="text-center mb-4">🏝️ Туристический агрегатор</h1>

    <!-- Каталог туров -->
    <div class="row" id="catalog"></div>

    <!-- Корзина / бронирования -->
    <hr class="my-4">
    <h3>📋 Мои бронирования</h3>
    <div id="bookings" class="list-group"></div>
</div>

<!-- Всплывающие уведомления -->
<div id="status-area" class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
    <div id="liveToast" class="toast bg-success text-white" role="alert" data-bs-autohide="true" data-bs-delay="3000">
        <div class="d-flex">
            <div class="toast-body" id="toastMessage">
                Уведомление
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
